name: Auto Changelog

on:
  push:
    branches: [main]
    paths:
      - 'Waddle.user.js'

permissions:
  contents: write
  models: read

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate summary and update CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
          const { execSync } = require('child_process');
          const { readFileSync, writeFileSync } = require('fs');
          const https = require('https');

          function post(payload) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify(payload);
              const req = https.request({
                hostname: 'models.github.ai',
                path: '/inference/chat/completions',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github+json',
                  'Authorization': 'Bearer ' + process.env.GH_TOKEN,
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Length': Buffer.byteLength(body),
                },
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch (e) { reject(new Error('Bad JSON: ' + data.slice(0, 200))); }
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function main() {
            const src = readFileSync('Waddle.user.js', 'utf8');
            const version = (src.match(/@version\s+([\d.]+)/) || [])[1];
            if (!version) throw new Error('Could not find @version in Waddle.user.js');

            const date = new Date().toISOString().slice(0, 10);
            const diff = execSync('git diff HEAD~1 HEAD -- Waddle.user.js').toString().slice(0, 6000);

            if (!diff.trim()) { console.log('No diff found.'); process.exit(0); }

            const result = await post({
              model: 'openai/gpt-4o-mini',
              messages: [
                {
                  role: 'system',
                  content: [
                'You summarize code diffs into a single short changelog entry.',
                'Output ONLY a JSON array with ONE concise plain-English string.',
                'Max 8 words. Focus on the overall theme of the changes, not every detail.',
                'No markdown, no code blocks, no extra text — just the raw JSON array.',
                'Example: [\"Renamed modules and tweaked AFK message\"]',
              ].join(' '),
                },
                { role: 'user', content: diff },
              ],
              temperature: 0.3,
              max_tokens: 300,
            });

            const raw = result.choices?.[0]?.message?.content?.trim() ?? '[]';
            let messages;
            try { messages = JSON.parse(raw); }
            catch { messages = [raw]; }

            if (!messages.length) { console.log('No changes extracted.'); process.exit(0); }

            const bullets = messages.map(m => '- ' + m).join('\n');
            let changelog = readFileSync('CHANGELOG.md', 'utf8');

            if (changelog.includes('## [' + version + ']')) {
              changelog = changelog.replace(
                new RegExp('(## \\\\[' + version.replace('.', '\\\\.') + '\\\\][^\n]*\n### Changed\n)'),
                '\$1' + bullets + '\n'
              );
            } else {
              const divider = '---';
              const idx = changelog.indexOf(divider);
              if (idx === -1) throw new Error('Could not find --- divider in CHANGELOG.md');
              const entry = '## [' + version + '] - ' + date + '\n### Changed\n' + bullets + '\n';
              changelog =
                changelog.slice(0, idx + divider.length) +
                '\n\n' + entry +
                changelog.slice(idx + divider.length).replace(/^\n+/, '\n');
            }

            writeFileSync('CHANGELOG.md', changelog, 'utf8');
            writeFileSync('/tmp/summary.txt', messages.join(', '), 'utf8');
          }

          main().catch(e => { console.error('FATAL:', e); process.exit(1); });
          "

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          SUMMARY=$(cat /tmp/summary.txt 2>/dev/null || echo "update changelog")
          git diff --cached --quiet || git commit -m "chore: $SUMMARY [skip ci]"
          git push
